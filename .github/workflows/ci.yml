name: CI

# Mirrors ./test.bash locally — each job installs the prerequisites it needs
# and then delegates to a single ./test.bash flag, so there is one source of
# truth for "what counts as passing tests."

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (shellcheck + bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ./test.bash --lint
        run: ./test.bash --lint

  unit:
    name: Unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + python3
        run: sudo apt-get update && sudo apt-get install -y bats python3
      - name: ./test.bash --unit
        run: ./test.bash --unit

  e2e:
    name: End-to-end bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ./test.bash --e2e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./test.bash --e2e

  docker-e2e:
    name: End-to-end bootstrap (fresh ubuntu:22.04 container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ./test.bash --docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./test.bash --docker

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: ./test.bash --secrets
        run: ./test.bash --secrets
